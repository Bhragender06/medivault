services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: medivault
      POSTGRES_USER: medivault
      POSTGRES_PASSWORD: medivault
    ports:
      - "5432:5432"
    volumes:
      - medivault_db:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://medivault:medivault@db:5432/medivault
      SECRET_KEY: change-me
      JWT_SECRET_KEY: change-me-too
      CORS_ORIGINS: http://127.0.0.1:8080,http://localhost:8080
      REGISTRATION_XLSX_PATH: backend/exports/registration.xlsx
    ports:
      - "5000:5000"
    volumes:
      - ../backend:/app/backend
    depends_on:
      - db

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_URL: http://127.0.0.1:5000
    ports:
      - "8080:8080"
    volumes:
      - ../frontend:/app/frontend
      - ../vite.config.ts:/app/vite.config.ts
      - ../package.json:/app/package.json
      - ../package-lock.json:/app/package-lock.json
    depends_on:
      - backend

volumes:
  medivault_db:

